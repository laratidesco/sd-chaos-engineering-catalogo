apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-naive
  labels:
    app: api-gateway-naive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-naive
  template:
    metadata:
      labels:
        app: api-gateway-naive
    spec:
      containers:
        - name: api-gateway-naive
          image: api-gateway-naive:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
