# Mata um pod do product-service em pleno funcionamento para observar
# se o gateway se recupera (retry) e como o Kubernetes recria o pod.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-product-service-pod
spec:
  action: pod-kill
  mode: one
  selector:
    labelSelectors:
      app: product-service
  gracePeriod: 0
